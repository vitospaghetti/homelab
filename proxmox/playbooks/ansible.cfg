[defaults]
deprecation_warnings        = False
executable                  = /bin/bash
host_key_checking           = False
force_valid_group_names     = ignore
log_path                    = ./ansible.log
roles_path                  = ./roles
stdout_callback             = debug
stderr_callback             = debug
force_color                 = true


[privilege_escalation]
become                  = false
become_method           = sudo
become_ask_pass         = False
